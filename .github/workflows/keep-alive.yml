name: Render Keep-Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # 14분마다 실행 (Render 15분 슬립 방지)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://multimedia-summary.onrender.com/api/health")
          echo "Response: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Server is awake and healthy"
          else
            echo "Warning: unexpected status $STATUS"
          fi
