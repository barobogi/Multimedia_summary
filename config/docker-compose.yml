  #   image: postgres:15-alpine
  #   container_name: multimedia-db
  #   environment:
  #     POSTGRES_PASSWORD: postgres
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  # postgres_data:

networks:
  default:
    name: multimedia-network
