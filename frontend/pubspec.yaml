name: multimedia_summary
description: "동영상 요약 및 자동 배포 모바일 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 네트워킹
  http: ^1.1.0
  dio: ^5.3.0

  # 상태 관리
  provider: ^6.0.0
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # 저장소
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # 날짜/시간
  intl: ^0.19.0

  # UI/UX
  cupertino_icons: ^1.0.2
  flutter_markdown: ^0.6.0
  url_launcher: ^6.2.0
  share_plus: ^7.2.0
  clipboard_manager: ^0.2.3

  # 로깅
  logger: ^2.0.0
  log_to_file: ^0.0.14

  # 권한 관리
  permission_handler: ^11.4.0

  # 로컬 저장소 암호화
  encrypt: ^5.0.0

  # JSON 직렬화
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/data/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
