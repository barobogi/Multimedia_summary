name: multimedia_summary
description: "동영상 요약 및 자동 배포 모바일 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 네트워킹
  dio: ^5.3.0

  # 상태 관리
  provider: ^6.0.0

  # 저장소
  shared_preferences: ^2.2.0

  # 날짜/시간
  intl: ^0.19.0

  # UI/UX
  cupertino_icons: ^1.0.2
  url_launcher: ^6.2.0
  share_plus: ^7.2.0

  # 로깅
  logger: ^2.0.0

  # JSON 직렬화
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
