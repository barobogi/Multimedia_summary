services:
  - type: web
    name: multimedia-summary
    runtime: docker
    dockerfilePath: config/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DAUM_ID
        sync: false
      - key: DAUM_PW
        sync: false
